name: Envío de boletines (nube)

# Corre en la nube: no depende de tu Mac.
# Cada 30 min (UTC) revisa qué boletines de Supabase toca enviar
# según día/hora Chile de cada uno.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force_all:
        description: "Enviar todos los boletines activos ahora (ignora día/hora)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar secretos mínimos
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=0
          for v in GMAIL_USER GMAIL_APP_PASSWORD GEMINI_API_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Falta el secret $v (Repo → Settings → Secrets and variables → Actions)"
              missing=1
            fi
          done
          exit $missing

      - name: Ejecutar boletines desde la web
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TZ: America/Santiago
          PYTHONPATH: src
        run: |
          # URL por defecto si no configuraste el secret SUPABASE_URL
          export SUPABASE_URL="${SUPABASE_URL:-https://ryznnccmqyvujrlhriml.supabase.co}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_all }}" = "true" ]; then
            echo "Envío manual de todos los boletines activos"
            python -m boletin run --from-web -v --no-drive
          else
            echo "Modo agenda: solo boletines due ahora (Chile)"
            python -m boletin run --scheduled -v --no-drive
          fi

      - name: Publicar PDFs en GitHub Pages (si hubo output)
        if: success()
        run: |
          if [ -z "$(git status --porcelain docs/)" ]; then
            echo "Sin cambios en docs/"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data docs/boletines || true
          git diff --staged --quiet && exit 0
          git commit -m "Publish bulletin artifacts from scheduled run"
          git push

      - name: Subir artefactos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boletin-output
          path: output/
          if-no-files-found: ignore
          retention-days: 30
